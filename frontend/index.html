<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>



    <div class="container">
            <div class="theme-switch">
                <span id="theme=icon">🌙</span>
                    <label class="theme-switch" for="checkbox">
                         <input type="checkbox" id="checkbox" />
                         <div class="slider round"></div>
                 </label>
             </div>

        <h1>Controle de estoque</h1>

        <div id= "menu" class="menu">
            <button onclick="mostrarCadastro()">Cadastrar Produto</button>
            <button onclick="mostrarLista()">Listar Produtos</button>
        </div>

        <!-- Cadastro -->
        <div id="cadastro" class="card hidden">
            <h2>Cadastro de novo produto</h2>
            <form id="formProduto" class="form">
                <input type="text" id="nome" placeholder="Nome do Produto" required>
                <input type="text" id="codigo" placeholder="Codigo (Ex: SKU-000)" required>
                <input type="number" id="valor_unitario" placeholder="Valor Unitário" required>
                <input type="number" id="quantidade" placeholder="Quantidade" required>
                <button type="submit" class="btn-primary">Adicionar</button>
            </form>
            <button onclick="voltarHome()" class="btn-secondary">Voltar</button>
        </div>

        <!-- Lista -->
        <div id="listaTela" class="card hidden">
            <h2>Lista de Produtos Cadastrados</h2>
            <div id="listaProdutos" class="tabela"></div>
            <button onclick="voltarHome()" class="btn-secondary">Voltar</button>
        </div>

    </div>

    <!-- MODAL -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h3>Editar Produto</h3>
            
            <input type="text" id="editNome" placeholder="Nome do Produto">
            <input type="text" id="editCodigo" placeholder="Código">
            <input type="number" id="editValor" placeholder="Valor">
            <input type="number" id="editQuantidade" placeholder="Quantidade">

            <div style="margin-top:15px; text-align:right;">
                <button onclick="salvarEdicao()" class="btn-primary">Salvar</button>
                <button onclick="fecharModal()" class="btn-secondary">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="script.js" defer></script>
    </body>
    </html>
